services:
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - TOKEN_EXPIRE_MINUTES=${TOKEN_EXPIRE_MINUTES:-60}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - DEFAULT_ADMIN_USERNAME=${DEFAULT_ADMIN_USERNAME:-admin@ucb.edu.bo}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-admin123}
      - INSTITUTIONAL_EMAIL_DOMAIN=${INSTITUTIONAL_EMAIL_DOMAIN:-@ucb.edu.bo}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - POCKETBASE_URL=${POCKETBASE_URL:-}
      - POCKETBASE_USERS_COLLECTION=${POCKETBASE_USERS_COLLECTION:-users}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY:-}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD:-}
      - POCKETBASE_AUTH_COLLECTION=${POCKETBASE_AUTH_COLLECTION:-_superusers}
      - POCKETBASE_TIMEOUT_SECONDS=${POCKETBASE_TIMEOUT_SECONDS:-10}

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8001}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${JWT_ALGORITHM:-HS256}
      - POCKETBASE_URL=${POCKETBASE_URL:-}
      - POCKETBASE_IDENTITY=${POCKETBASE_AUTH_IDENTITY:-}
      - POCKETBASE_PASSWORD=${POCKETBASE_AUTH_PASSWORD:-}

  role-service:
    build:
      context: ./role-service
    container_name: role-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8001}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${JWT_ALGORITHM:-HS256}
      - POCKETBASE_URL=${POCKETBASE_URL:-}
      - POCKETBASE_ROLE_COLLECTION=${POCKETBASE_ROLE_COLLECTION:-role}
      - POCKETBASE_USERS_COLLECTION=${POCKETBASE_USERS_COLLECTION:-users}
      - POCKETBASE_AUTH_TOKEN=${POCKETBASE_AUTH_TOKEN:-}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY:-}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD:-}
      - POCKETBASE_AUTH_COLLECTION=${POCKETBASE_AUTH_COLLECTION:-_superusers}
      - POCKETBASE_TIMEOUT_SECONDS=${POCKETBASE_TIMEOUT_SECONDS:-10}
  reservations-service:
    build:
      context: ./reservations-service
    container_name: reservations-service
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8001}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://inventory-service:8003}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
      - RESERVATIONS_DATABASE_URL=${RESERVATIONS_DATABASE_URL:-sqlite:///./reservations.db}
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://auth-service:8001}
      - INVENTORY_SERVICE_URL=${INVENTORY_SERVICE_URL:-http://inventory-service:8003}
      - ROLE_SERVICE_URL=${ROLE_SERVICE_URL:-http://role-service:8004}
      - RESERVATIONS_SERVICE_URL=${RESERVATIONS_SERVICE_URL:-http://reservations-service:8005}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000" 
    depends_on:
      - auth-service
      - inventory-service
      - role-service
      - reservations-service
