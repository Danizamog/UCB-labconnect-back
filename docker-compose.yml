services:
  postgres:
    image: postgres:16-alpine
    container_name: labconnect-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-labconnect}
      - POSTGRES_USER=${POSTGRES_USER:-labconnect}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-labconnect}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - labconnect_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-labconnect} -d ${POSTGRES_DB:-labconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: labconnect-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}
      - POCKETBASE_RETRY_SECONDS=${POCKETBASE_RETRY_SECONDS:-60}
      - DATA_MODE=${DATA_MODE:-hybrid}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://labconnect:labconnect@postgres:5432/labconnect}
      - LOCAL_DATA_NAMESPACE=${LOCAL_DATA_NAMESPACE:-labconnect}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8003:8003"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}
      - POCKETBASE_RETRY_SECONDS=${POCKETBASE_RETRY_SECONDS:-60}
      - DATA_MODE=${DATA_MODE:-hybrid}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://labconnect:labconnect@postgres:5432/labconnect}
      - LOCAL_DATA_NAMESPACE=${LOCAL_DATA_NAMESPACE:-labconnect}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  role-service:
    build:
      context: ./role-service
    container_name: role-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}
      - POCKETBASE_RETRY_SECONDS=${POCKETBASE_RETRY_SECONDS:-60}
      - DATA_MODE=${DATA_MODE:-hybrid}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://labconnect:labconnect@postgres:5432/labconnect}
      - LOCAL_DATA_NAMESPACE=${LOCAL_DATA_NAMESPACE:-labconnect}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  reservation-service:
    build:
      context: ./reservation-service
    container_name: reservation-service
    ports:
      - "8005:8005"
    volumes:
      - ./reservation-service/data:/app/data
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}
      - POCKETBASE_USERS_COLLECTION=${POCKETBASE_USERS_COLLECTION:-users}
      - POCKETBASE_RETRY_SECONDS=${POCKETBASE_RETRY_SECONDS:-60}
      - TUTORIAL_SESSIONS_STORAGE_PATH=/app/data/tutorial_sessions.json
      - DATA_MODE=${DATA_MODE:-hybrid}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://labconnect:labconnect@postgres:5432/labconnect}
      - LOCAL_DATA_NAMESPACE=${LOCAL_DATA_NAMESPACE:-labconnect}
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_SENDER=${SMTP_SENDER:-labconnect@ucb.edu.bo}
      - SMTP_USE_TLS=false
      - SMTP_USE_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - ROLE_SERVICE_URL=http://role-service:8004
      - RESERVATIONS_SERVICE_URL=http://reservation-service:8005
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      auth-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      role-service:
        condition: service_healthy
      reservation-service:
        condition: service_healthy

volumes:
  labconnect_postgres_data:
