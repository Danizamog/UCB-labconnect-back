services:
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    ports:
      - "8003:8003"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}

  role-service:
    build:
      context: ./role-service
    container_name: role-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}

  reservation-service:
    build:
      context: ./reservation-service
    container_name: reservation-service
    ports:
      - "8005:8005"
    volumes:
      - ./reservation-service/data:/app/data
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}
      - POCKETBASE_USERS_COLLECTION=${POCKETBASE_USERS_COLLECTION:-users}
      - TUTORIAL_SESSIONS_STORAGE_PATH=/app/data/tutorial_sessions.json

  supply-reservation-service:
    build:
      context: ./supply-reservation-service
    container_name: supply-reservation-service
    ports:
      - "8006:8006"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - SECRET_KEY=${SECRET_KEY}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_AUTH_IDENTITY=${POCKETBASE_AUTH_IDENTITY}
      - POCKETBASE_AUTH_PASSWORD=${POCKETBASE_AUTH_PASSWORD}
      - POCKETBASE_INVENTORY_STOCK_ITEMS_COLLECTION=${POCKETBASE_INVENTORY_STOCK_ITEMS_COLLECTION:-inventory_stock_items_v2}
      - POCKETBASE_SUPPLY_RESERVATIONS_COLLECTION=${POCKETBASE_SUPPLY_RESERVATIONS_COLLECTION:-supply_reservation}
  
  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - ROLE_SERVICE_URL=http://role-service:8004
      - RESERVATIONS_SERVICE_URL=http://reservation-service:8005
      - SUPPLY_RESERVATION_SERVICE_URL=http://supply-reservation-service:8006
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      - auth-service
      - inventory-service
      - role-service
      - reservation-service
      - supply-reservation-service
